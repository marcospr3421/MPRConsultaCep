version: '3.8'

services:
  mpr-consulta-cep:
    build: .
    container_name: mpr-consulta-cep-web
    ports:
      - "8080:8080"
    environment:
      # Azure authentication - these should be set in your environment or .env file
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      # Alternative: use managed identity in Azure
      - AZURE_USE_MSI=${AZURE_USE_MSI:-false}
      # Flask configuration
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Uncomment to add persistent logs
    # volumes:
    #   - ./logs:/app/logs
    networks:
      - mpr-network

networks:
  mpr-network:
    driver: bridge
